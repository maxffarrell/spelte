<!doctype html>
<html lang="en" %sveltekit.attributes%>
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico?v=2" sizes="any" type="image/x-icon" />
		<link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico?v=2" type="image/x-icon" />
		<link rel="icon" href="%sveltekit.assets%/icon.svg?v=2" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png?v=2" type="image/png" sizes="32x32" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png?v=2" sizes="180x180" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Geist+Mono:wght@100..900&family=DynaPuff:wght@400..700&family=Instrument+Serif:ital@0;1&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--font-geist-sans: 'Geist', ui-sans-serif, system-ui, sans-serif;
				--font-geist-mono: 'Geist Mono', ui-monospace, monospace;
				--font-instrument-serif: 'Instrument Serif', ui-serif, Georgia, serif;
				--font-dyna-puff: 'DynaPuff', system-ui, sans-serif;
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="min-h-dvh bg-background text-foreground antialiased font-sans">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
